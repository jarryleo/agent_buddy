name: agent_buddy
description: "Agent Buddy - 跨端智能体基座"
publish_to: 'none'
version: 1.0.6+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  flutter_markdown_plus: ^1.0.0
  flutter_highlight: ^0.7.0
  markdown: ^7.3.0
  intl: ^0.20.2
  uuid: ^4.5.1
  html: ^0.15.5
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  file_picker: ^8.1.4
  llamadart: ^0.8.13
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  package_info_plus: ^9.0.1
  window_manager: ^0.5.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
