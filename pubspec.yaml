name: agent_buddy
description: "Agent Buddy - 跨端智能体基座"
publish_to: 'none'
version: 1.1.1+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  flutter_markdown_plus: ^1.0.0
  flutter_highlight: ^0.7.0
  markdown: ^7.3.0
  intl: ^0.20.2
  uuid: ^4.5.1
  html: ^0.15.5
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  file_picker: ^8.1.4
  llamadart: ^0.8.16
  flutter_local_notifications: ^22.0.1
  # Windows-only local notifications via the WinToast C++/WinRT
  # library. Replaces our previous PowerShell balloon approach,
  # which spawned `powershell.exe` and got flagged by EDR / AV.
  # The plugin keeps everything in-process (no child process) and
  # shows real Windows 10/11 toasts via the ToastNotificationManager
  # API. macOS / Linux keep going through `flutter_local_notifications`.
  local_notifier: ^0.1.6
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  package_info_plus: ^9.0.1
  window_manager: ^0.5.0
  speech_to_text: ^7.4.0
  # Explicit, well-tested cross-platform permission flow. The
  # `speech_to_text` plugin handles its own permission prompt on
  # paper, but in practice the OS dialog is unreliable on some
  # Android skins (MIUI / EMUI / ColorOS) and the plugin can fail
  # silently. `permission_handler` is the de-facto standard
  # permission helper and gives us a reliable `microphone` request
  # with a `permanentlyDenied` distinction so the UI can point the
  # user at system settings.
  permission_handler: ^11.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/
    - assets/json/
    - assets/jinja/
